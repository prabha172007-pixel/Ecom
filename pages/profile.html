<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/styles/app.css" type="text/css" />
    <link rel="stylesheet" href="/styles/profile.css" type="text/css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
      .element2 {
        padding-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="navigation_bar">
      <div class="navigation_element">
        <div class="logo_box">
          <span>LOGO</span>

          <div class="search_box">
            <img src="/asserts/icon/Group 9.svg" />
            <span class="sep"></span>
            <input type="text" placeholder="Search" />
          </div>
        </div>
        <div class="navigation_items">
          <a href="">Home</a>
          <a href="">Product</a>
          <a href="">About Us</a>
          <a href="">Contect Us</a>
        </div>
        <div class="navigation_element3">
          <img src="/asserts/icon/menu-icon.svg" />
        </div>
      </div>
      <div class="navigation_element2">
        <div class="nav">
          <img src="/asserts/icon/Frame.svg" />
        </div>
        <div class="element1">
          <div class="car-profile">
            <img src="/asserts/image/Ellipse 28.png" />
          </div>
          <div class="element2">
            <img
              src="/asserts/icon/contect_icon.svg"
              width="18px"
              height="18px"
            />
            <span>Login / Register</span>
          </div>
        </div>
      </div>
    </div>
    <div class="page">
      <div class="top-part">
        <div class="heading">
          <div class="heading_element">
            <span>My Profile</span>
            <div></div>
          </div>
          <div class="heading_element">
            <span>Password</span>
            <div></div>
          </div>
          <div class="heading_element">
            <span>My Order</span>
            <div></div>
          </div>
        </div>
        <div class="personal_detail">
          <div class="about_profile">
            <div class="profile1">
              <span>personal Info</span>
            </div>
            <div class="update_profil">
              <span>Update your profile and personal details here</span>
            </div>
          </div>
          <div class="contect">
            <div class="div1">
              <div class="name_detail">
                <div>
                  <label for="name">Your Name</label>
                  <input
                    type="text"
                    id="name"
                    name="Name"
                    value="Karthick"
                    required
                  />
                </div>
                <div>
                  <label for="number">Mobile Number</label>
                  <input
                    type="tel"
                    id="number"
                    name="Number"
                    value="+91  9080983322"
                  />
                </div>
                <div>
                  <label for="mail">Email Address</label>
                  <input
                    type="email"
                    id="mail"
                    name="Email"
                    value="Karthick@gmail.com"
                  />
                </div>
                <div class="image">
                  <span for="file">Image</span>
                  <input type="file" id="upload" name="File" />
                  <label for="upload">Drag & Drop your files or Browse</label>
                  <img src="/asserts/image/Image A.png" />
                </div>
              </div>
            </div>
            <div class="div2"></div>
          </div>
        </div>
      </div>
      <div class="seperating_line">
        <hr />
      </div>
      <div class="bottom-part">
        <div class="personal_detail">
          <div class="about_profile">
            <div class="profile1">
              <span>Address</span>
            </div>
            <div class="update_profil">
              <span>Update your address here</span>
            </div>
          </div>
          <div class="contect">
            <div class="div1">
              <div class="name_detail">
                <div>
                  <label for="address">Address</label>
                  <input
                    type="text"
                    name="Address"
                    id="address"
                    value="1/103, A, Main St, Mannarkudi"
                  />
                </div>
                <div class="detail">
                  <label for="country">Country</label>
                  <select name="country" id="country">
                    <option value="">Saudi Arabia</option>
                  </select>
                </div>
                <div class="detail">
                  <label for="state">State</label>
                  <select name="state" id="state">
                    <option value="">Riyadh Province</option>
                  </select>
                </div>
                <div class="detail">
                  <label for="Apartment">Apartment,Suites,etc..</label>
                  <input
                    type="text"
                    id="Apartment"
                    name="apartment"
                    value="Vinayaga Apartments"
                  />
                </div>
                <div class="detail">
                  <label for="city">City</label>
                  <select name="" id="City">
                    <option value="">Riyadh</option>
                  </select>
                </div>
                <div class="detail">
                  <label for="zip">Zip/Postal Code</label>
                  <input
                    type="text"
                    id="zip"
                    name="zip/postal Code"
                    value="12375"
                  />
                </div>
              </div>
            </div>
            <div class="div2"></div>
          </div>
        </div>
        <div class="button-tag">
          <button class="button1">Save</button>
          <button class="button1">Cancel</button>
        </div>
      </div>
    </div>
    <div class="fooder">
      <div class="food">
        <div class="cont1">
          <span>LOGO</span>
        </div>
        <div class="cont2">
          <a href="">Home</a>
          <a href="">Contect Us</a>
          <a href="">Private Policy</a>
          <a href="">Terms & condintion</a>
        </div>
      </div>
      <div class="food2">
        <div class="cont3">
          <img src="/asserts/icon/ant-design_facebook-filled.svg" />
          <img src="/asserts/icon/instagram.svg" />
          <img src="/asserts/icon/twitter.svg" />
        </div>
        <div class="cont4">
          <span>@All Right Reserved</span>
        </div>
      </div>
    </div>
    <div class="navigation">
      <div class="element">
        <div class="element_1">
          <img src="/asserts/icon/Frame (3).svg" />
          <span>Home</span>
        </div>
        <div class="element_1">
          <img src="/asserts/icon/Frame (2).svg" />
          <span>Search</span>
        </div>
        <div class="element_1">
          <img src="/asserts/icon/Frame (1).svg" />
          <span>Products</span>
        </div>
        <div class="element_1">
          <img src="/asserts/icon/frame 222.svg" />
          <span>profile</span>
        </div>
      </div>
    </div>
  </body>
</html>
